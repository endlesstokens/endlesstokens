[settings]
lockfile = true

[tools]
# `default` rustup profile is NOT used; mise installs minimal. rustfmt + clippy
# are needed by CI's fmt/clippy steps, llvm-tools-preview by cargo-llvm-cov.
rust = { version = "1.95.0", components = "rustfmt,clippy,llvm-tools-preview" }
"cargo:cargo-llvm-cov" = "0.8.7"
"cargo:cargo-audit" = "0.22.1"
actionlint = "1.7.12"
gitleaks = "8.30.1"
trivy = "0.70.0"
# actionlint shells out to shellcheck for `run:` blocks. Pin it so local
# `actionlint` matches CI (GitHub runners have shellcheck preinstalled).
shellcheck = "0.11.0"

[tasks.fmt]
description = "Check Rust formatting"
run = "cargo fmt --all -- --check"

[tasks.clippy]
description = "Run Rust lints"
run = "cargo clippy --all-targets -- -D warnings"

[tasks.test]
description = "Run all Rust tests"
run = "cargo test --all-targets"

[tasks.check]
description = "Run fast Rust type checks"
run = "cargo check --all-targets"

[tasks.coverage]
description = "Run tests with a coverage summary"
run = "cargo llvm-cov --all-targets --locked --summary-only"

[tasks.workflow-lint]
description = "Lint GitHub Actions workflows"
run = "test ! -d .github/workflows || actionlint"

[tasks.notices]
description = "Check third-party notices against Cargo.lock"
run = "bash scripts/check-third-party-notices.sh"

[tasks.audit]
description = "Scan Rust dependencies for security advisories"
run = "cargo audit --db target/cargo-audit-db"

[tasks.secret-scan]
description = "Scan committed history for leaked secrets"
run = "gitleaks detect --source . --redact --no-banner"

[tasks.security-scan]
description = "Scan the filesystem for high-severity vulnerabilities and misconfigurations"
run = "trivy fs --cache-dir target/trivy-cache --disable-telemetry --skip-version-check --scanners vuln,misconfig --severity HIGH,CRITICAL --exit-code 1 --skip-dirs target --skip-dirs .git --no-progress ."

[tasks.build]
description = "Build the release binary"
run = "cargo build --release --locked"

[tasks.ci]
description = "Run the main local CI checks"
depends = [
    "fmt",
    "check",
    "clippy",
    "workflow-lint",
    "notices",
    "audit",
    "secret-scan",
    "security-scan",
    "test",
    "coverage",
    "build",
]
